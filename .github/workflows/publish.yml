name: Publish to npm

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # Mandatory: Allows GitHub to generate the OIDC token
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build node
        run: npm run build

      - name: Publish to npm
        # No NPM_TOKEN env variable needed!
        # --provenance is automatically enabled when using Trusted Publishers
        env:
          RELEASE_MODE: 'true'
        run: npm publish --provenance --access public





